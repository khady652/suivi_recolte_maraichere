spring.application.name=user_service
server.port=3002


# POSTGRESQL
spring.datasource.url=jdbc:postgresql://localhost:5434/agrisuivi_users
spring.datasource.username=users_user
spring.datasource.password=users1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
auth.service.base-url=http://localhost:3001

# EUREKA
eureka.client.enabled=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# JWT
jwt.secret=agrisuivi_jwt_secret_key_256_bits_minimum_securite_2025

# ACTUATOR
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
springdoc.swagger-ui.cors-enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
geo.service.base-url=http://localhost:3003
